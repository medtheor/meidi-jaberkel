<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaberkel - Pembayaran</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="logo.png">
</head>
<body>

<header class="navbar">
  <div class="container nav-content">
    <h1 class="logo">Jaberkel</h1>

    <nav>
      <a href="index.html">Beranda</a>
    </nav>
  </div>
</header>

<section class="container" style="padding:40px 0;">

  <div class="hero-card">

    <h2>Form Pembayaran</h2>

    <form id="paymentForm">

      <input
        type="text"
        name="nama"
        placeholder="Nama Siswa"
        
      >

      <input
        type="text"
        name="kelas"
        placeholder="Kelas"
        
      >

      <input
        type="date"
        name="tanggal"
        
      >

      <input
        type="number"
        name="nominal"
        placeholder="Nominal Pembayaran"
        
      >

      <input
        type="file"
        name="bukti"
        accept="image/*"
        
      >

      <button
        type="submit"
        class="btn btn-primary">
        Simpan Pembayaran
      </button>

    </form>
  </div>

  <br>

  <div class="hero-card">

    <h2>Riwayat Pembayaran</h2>

    <table id="paymentTable">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Tanggal</th>
          <th>Nominal</th>
          <th>Status</th>
          <th>Bukti</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>

  </div>

</section>

<script src="js/app.js"></script>

</body>
</html>
